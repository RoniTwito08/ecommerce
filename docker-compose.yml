version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: helfy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - helfy-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '--silent']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helfy-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '${BACKEND_PORT:-5000}:5000'
    networks:
      - helfy-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: helfy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - '${FRONTEND_PORT:-3000}:80'
    networks:
      - helfy-network

networks:
  helfy-network:
    driver: bridge

volumes:
  mysql-data:
